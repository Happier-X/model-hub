# 推送 v* tag 时在 Windows 构建 NSIS、Updater 签名资产并创建 GitHub Release。
name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            gateway-rust

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Require updater signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "缺少 GitHub Secret TAURI_SIGNING_PRIVATE_KEY，拒绝发布未签名更新包。"
          }

      - name: Prepare bundled gateway-rust (cargo release + copy)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/prepare-bundled-gateway-rust.ps1

      - name: Build and release Tauri updater assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Model Hub ${{ github.ref_name }}
          releaseBody: |
            请先阅读随 Release 附件提供的中文发布说明与 SHA256SUMS.txt。
            本版本默认网关为 gateway-rust（model-hub-gateway）；发布包不再内嵌 octopus 二进制。
            本版本支持设置页手动检查更新；更新包必须通过 Tauri 签名校验。
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          tauriScript: pnpm exec tauri
          args: --bundles nsis -c src-tauri/tauri.release.conf.json

      - name: Verify published updater manifest and signatures
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $tag = $env:GITHUB_REF_NAME
          $release = gh api "repos/$repo/releases/tags/$tag" | ConvertFrom-Json
          $names = @($release.assets | ForEach-Object { $_.name })
          if ($names -notcontains "latest.json") { throw "Release 缺少 latest.json" }
          if (-not ($names | Where-Object { $_ -like "*.sig" })) { throw "Release 缺少 updater .sig 签名" }
          $latestAsset = $release.assets | Where-Object { $_.name -eq "latest.json" } | Select-Object -First 1
          gh api -H "Accept: application/octet-stream" $latestAsset.url > latest.json
          $manifest = Get-Content latest.json -Raw | ConvertFrom-Json
          $expected = $tag.TrimStart("v")
          if ($manifest.version -ne $expected) { throw "latest.json 版本 $($manifest.version) 与 tag $tag 不一致" }
          $windows = $manifest.platforms.'windows-x86_64'
          if (-not $windows.url -or -not $windows.signature) { throw "latest.json 缺少 windows-x86_64 URL 或签名" }
          $assetName = [System.IO.Path]::GetFileName(([Uri]$windows.url).AbsolutePath)
          if ($names -notcontains $assetName) { throw "latest.json 引用的资产 $assetName 不在 Release 中" }

      - name: Collect release notes and SHA-256
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $outDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $nsis = Get-ChildItem -Path (Join-Path $bundleRoot "nsis") -Filter "*.exe" | Select-Object -First 1
          if (-not $nsis) { throw "未找到 NSIS 安装包" }
          Copy-Item -Force $nsis.FullName (Join-Path $outDir $nsis.Name)
          $notes = "docs/release-notes-v$($env:GITHUB_REF_NAME.TrimStart('v')).md"
          if (Test-Path $notes) { Copy-Item -Force $notes (Join-Path $outDir (Split-Path $notes -Leaf)) }
          $lines = Get-ChildItem $outDir -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          $lines | Set-Content (Join-Path $outDir "SHA256SUMS.txt") -Encoding utf8

      - name: Upload release assets to existing Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          append_body: true
          body: |

            发布说明与 SHA-256 已作为附件上传。Updater 使用 Tauri 签名校验。
            默认网关为 gateway-rust；发布包不再内嵌 octopus / AGPL 侧车二进制。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-hub-windows-updater
          path: |
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/latest.json
            src-tauri/target/release/bundle/nsis/*.sig
            release-assets/*
