# 推送 v* tag 时在 Windows 构建 NSIS、Updater 签名资产并创建 GitHub Release。
name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Require updater signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "缺少 GitHub Secret TAURI_SIGNING_PRIVATE_KEY，拒绝发布未签名更新包。"
          }

      - name: Read changelog for release body
        id: changelog
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.TrimStart("v")
          $path = "changelog/v$version.md"
          if (Test-Path $path) {
            $body = Get-Content $path -Raw
          } else {
            $body = "> 暂无更新日志`n`n本版本包含 Vue 3 管理台与 Tauri 进程内 Rust 代理。更新资产必须通过 Tauri 签名校验。"
          }
          $body += "`n`n---`n`n### 构建产物`n- Windows NSIS 安装包（见 Release 附件）`n- Updater 签名资产与 ``latest.json```n- ``SHA256SUMS.txt```n"
          # softprops / tauri-action 通过 env 传入多行 body 更稳妥
          "RELEASE_BODY<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $body | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 -NoNewline
          "EOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build and release Tauri updater assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Model Hub ${{ github.ref_name }}
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          tauriScript: pnpm exec tauri
          args: --bundles nsis -c src-tauri/tauri.release.conf.json

      - name: Verify published updater manifest and signatures
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $tag = $env:GITHUB_REF_NAME
          $release = gh api "repos/$repo/releases/tags/$tag" | ConvertFrom-Json
          $names = @($release.assets | ForEach-Object { $_.name })
          if ($names -notcontains "latest.json") { throw "Release 缺少 latest.json" }
          if (-not ($names | Where-Object { $_ -like "*.sig" })) { throw "Release 缺少 updater .sig 签名" }
          $latestAsset = $release.assets | Where-Object { $_.name -eq "latest.json" } | Select-Object -First 1
          gh api -H "Accept: application/octet-stream" $latestAsset.url > latest.json
          $manifest = Get-Content latest.json -Raw | ConvertFrom-Json
          $expected = $tag.TrimStart("v")
          if ($manifest.version -ne $expected) { throw "latest.json 版本 $($manifest.version) 与 tag $tag 不一致" }
          $windows = $manifest.platforms.'windows-x86_64'
          if (-not $windows.url -or -not $windows.signature) { throw "latest.json 缺少 windows-x86_64 URL 或签名" }
          $assetName = [System.IO.Path]::GetFileName(([Uri]$windows.url).AbsolutePath)
          if ($names -notcontains $assetName) { throw "latest.json 引用的资产 $assetName 不在 Release 中" }

      - name: Collect installers and SHA-256
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $outDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $nsis = Get-ChildItem -Path (Join-Path $bundleRoot "nsis") -Filter "*.exe" | Select-Object -First 1
          if (-not $nsis) { throw "未找到 NSIS 安装包" }
          Copy-Item -Force $nsis.FullName (Join-Path $outDir $nsis.Name)
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $changelog = "changelog/v$version.md"
          if (Test-Path $changelog) {
            Copy-Item -Force $changelog (Join-Path $outDir (Split-Path $changelog -Leaf))
          }
          $lines = Get-ChildItem $outDir -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          $lines | Set-Content (Join-Path $outDir "SHA256SUMS.txt") -Encoding utf8

      - name: Upload release assets to existing Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-hub-windows-updater
          path: |
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/latest.json
            src-tauri/target/release/bundle/nsis/*.sig
            release-assets/*
